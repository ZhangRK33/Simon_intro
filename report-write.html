<html lang="zh-CN">

  <body>
    <div class="page-shell report-page write-page">
      <main class="report-flow report-flow-write-simple">
        <section class="report-header">
          <div class="report-header-top">
            <div class="report-header-title">
              <h1>报告生成智能体</h1>
            </div>
          </div>

          <ol class="flow-stepper" aria-label="方案生成步骤">
            <li class="is-complete">
              <span class="step-index"><span class="step-index-label">01</span></span>
              <div>
                <strong>需求录入</strong>
                <span>明确方案需求</span>
              </div>
            </li>
            <li class="is-complete">
              <span class="step-index"><span class="step-index-label">02</span></span>
              <div>
                <strong>大纲确认</strong>
                <span>确认完成</span>
              </div>
            </li>
            <li class="is-active">
              <span class="step-index"><span class="step-index-label">03</span></span>
              <div>
                <strong>方案智写</strong>
                <span>生成完整内容</span>
              </div>
            </li>
          </ol>
        </section>

        <section class="write-simple-topbar">
          <div>
            <p class="outline-summary-eyebrow">正文生成</p>
            <h2 id="writeDocTitle">项目申报方案</h2>
            <p id="writeDocDesc">系统将按大纲树逐级生成内容：最子模块先生成，父级章节再基于子章节内容归纳总结。</p>
          </div>
          <div class="write-doc-actions" id="writeDocActions" hidden>
            <button class="report-btn report-btn-muted" type="button" id="regenerateDoc">重新生成</button>
            <button class="report-btn report-btn-primary" type="button" id="downloadDoc">下载文档</button>
          </div>
        </section>

        <section class="write-progress-shell" id="writeProgressShell">
          <div class="write-progress-head">
            <div>
              <p class="write-progress-kicker">Hierarchical Generation</p>
              <h3 id="writeProgressTitle">正在生成正式正文</h3>
              <p id="writeProgressText">系统会从最末级标题开始逐一生成，再向上汇总为完整文档。</p>
            </div>
            <span class="outline-status-pill" id="writeProgressBadge">准备中</span>
          </div>

          <div class="write-progress-track">
            <div class="write-progress-fill" id="writeProgressFill"></div>
          </div>

          <div class="write-progress-stats">
            <span id="writeProgressPercent">0%</span>
            <span id="writeProgressCounter">0 / 0 节点</span>
          </div>

          <div class="write-progress-timeline" id="writeProgressTimeline"></div>
        </section>

        <section class="write-doc-shell" id="writeDocShell" hidden>
          <article class="write-doc-paper">
            <header class="write-doc-cover">
              <h1 id="writeDocPaperTitle">项目申报方案</h1>
            </header>
            <div id="writeDocContent"></div>
          </article>
        </section>

        <div class="outline-empty-state" id="writeErrorState" hidden>
          <h2>正文生成中断</h2>
          <p id="writeErrorText">当前未能成功生成正文内容。系统已保留断点，可继续从失败位置恢复。</p>
          <div class="outline-empty-actions">
            <a class="report-btn report-btn-muted" href="./report-outline.html">返回大纲确认</a>
            <button class="report-btn report-btn-primary" type="button" id="retryDocGeneration">继续生成</button>
          </div>
        </div>
      </main>

    <script>
      const DRAFT_KEY = "report-agent-draft";
      const OUTLINE_KEY = "report-agent-outline";
      const DOC_KEY = "report-agent-doc";
      const DOC_PROGRESS_KEY = "report-agent-doc-progress";
      const BASE_URL = "https://api.siliconflow.cn/v1";
      const API_KEY = "sk-vhscuxbnmtrfabpusnssbbjfxszaslgpcrxegdnfpzlmvelv";
      const MODEL = "Qwen/Qwen3-8B";
      const API_URL = `${BASE_URL}/chat/completions`;
      const DOCUMENT_MAX_TOKENS = 8192;
      const promptConfig = window.ReportPromptConfig.getConfig();

      const writeDocTitle = document.getElementById("writeDocTitle");
      const writeDocDesc = document.getElementById("writeDocDesc");
      const writeDocPaperTitle = document.getElementById("writeDocPaperTitle");
      const writeDocContent = document.getElementById("writeDocContent");
      const writeDocActions = document.getElementById("writeDocActions");
      const downloadDocButton = document.getElementById("downloadDoc");
      const regenerateDocButton = document.getElementById("regenerateDoc");
      const retryDocGenerationButton = document.getElementById("retryDocGeneration");
      const writeProgressShell = document.getElementById("writeProgressShell");
      const writeProgressTitle = document.getElementById("writeProgressTitle");
      const writeProgressText = document.getElementById("writeProgressText");
      const writeProgressBadge = document.getElementById("writeProgressBadge");
      const writeProgressFill = document.getElementById("writeProgressFill");
      const writeProgressPercent = document.getElementById("writeProgressPercent");
      const writeProgressCounter = document.getElementById("writeProgressCounter");
      const writeProgressTimeline = document.getElementById("writeProgressTimeline");
      const writeDocShell = document.getElementById("writeDocShell");
      const writeErrorState = document.getElementById("writeErrorState");
      const writeErrorText = document.getElementById("writeErrorText");

      let currentDraft = null;
      let outlineGroups = [];
      let currentTree = [];
      let generationTasks = [];
      let generationMap = {};
      let progressState = null;
      let currentDoc = null;

      function isValidDocPayload(doc) {
        return Boolean(
          doc &&
            typeof doc.title === "string" &&
            typeof doc.html === "string" &&
            Number.isFinite(doc.taskCount) &&
            doc.taskCount >= 0 &&
            doc.generationMap &&
            typeof doc.generationMap === "object"
        );
      }

      function isValidProgressPayload(payload, signature) {
        return Boolean(
          payload &&
            payload.signature === signature &&
            payload.generatedMap &&
            typeof payload.generatedMap === "object" &&
            Number.isInteger(payload.nextIndex) &&
            payload.nextIndex >= 0
        );
      }

      function hashText(text) {
        let hash = 0;
        for (let index = 0; index < text.length; index += 1) {
          hash = (hash * 31 + text.charCodeAt(index)) >>> 0;
        }
        return String(hash);
      }

      function buildSignature(draft, groups) {
        return hashText(`${draft.name || ""}::${draft.requirement || ""}::${JSON.stringify(groups)}`);
      }

      function normalizeLine(line) {
        return line.replace(/\u3000/g, " ").trim();
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeXml(value) {
        return escapeHtml(value);
      }

      function buildAttachmentContext(attachment) {
        if (!attachment) {
          return "无附件。";
        }

        const summary = [
          `附件名称：${attachment.name}`,
          `附件格式：${attachment.extension || attachment.type || "未知"}`,
          `附件大小：${attachment.size || 0} 字节`
        ];

        if (attachment.textContent) {
          summary.push("附件文本内容：");
          summary.push(attachment.textContent);
        } else {
          summary.push("附件内容说明：当前仅提供附件元信息。");
        }

        return summary.join("\n");
      }

      function renderPrompt(template, vars) {
        return window.ReportPromptConfig.render(template, vars);
      }

      function setProgress(percent, current, total, title, text, state) {
        writeProgressFill.style.width = `${percent}%`;
        writeProgressPercent.textContent = `${Math.round(percent)}%`;
        writeProgressCounter.textContent = `${current} / ${total} 节点`;
        writeProgressTitle.textContent = title;
        writeProgressText.textContent = text;
        writeProgressBadge.textContent = state;
        writeProgressBadge.dataset.state = state === "已完成" ? "success" : state === "失败" ? "error" : "loading";
      }

      function parseOutlineTree(groups) {
        const tree = [];
        const nodeMap = new Map();
        const pattern = /^(\d+(?:\.\d+){0,4})\s+(.+)$/;

        groups.forEach((group) => {
          group.lines.forEach((line) => {
            const match = line.match(pattern);
            if (!match) {
              return;
            }

            const id = match[1];
            const title = match[2].trim();
            const level = id.split(".").length;
            const node = nodeMap.get(id) || {
              id,
              title,
              level,
              children: []
            };
            node.title = title;
            node.level = level;
            nodeMap.set(id, node);

            if (level === 1) {
              if (!tree.find((item) => item.id === id)) {
                tree.push(node);
              }
              return;
            }

            const parentId = id.split(".").slice(0, -1).join(".");
            const parentNode = nodeMap.get(parentId) || {
              id: parentId,
              title: parentId,
              level: level - 1,
              children: []
            };
            nodeMap.set(parentId, parentNode);
            if (!parentNode.children.find((item) => item.id === id)) {
              parentNode.children.push(node);
            }
          });
        });

        return tree;
      }

      function flattenPostOrder(nodes, tasks = []) {
        nodes.forEach((node) => {
          if (node.children.length) {
            flattenPostOrder(node.children, tasks);
          }
          tasks.push(node);
        });
        return tasks;
      }

      function updateTimeline(tasks, activeId) {
        writeProgressTimeline.innerHTML = "";
        tasks.forEach((task, index) => {
          const item = document.createElement("div");
          item.className = "write-progress-item";
          const generated = Boolean(generationMap[task.id]);
          if (generated) {
            item.classList.add("is-complete");
          } else if (task.id === activeId) {
            item.classList.add("is-active");
          }
          item.innerHTML = `
            <span class="write-progress-item-index">${String(index + 1).padStart(2, "0")}</span>
            <div>
              <strong>${task.id} ${task.title}</strong>
              <span>${generated ? "已生成" : task.id === activeId ? "正在生成" : "等待中"}</span>
            </div>
          `;
          writeProgressTimeline.appendChild(item);
        });
      }

      async function requestNodeContent(node, childSummaries) {
        const isLeaf = node.children.length === 0;
        const prompt = renderPrompt(promptConfig.documentNodeUser, {
          nodeId: node.id,
          nodeTitle: node.title,
          planName: currentDraft.name || "项目申报方案",
          requirement: currentDraft.requirement,
          attachmentContext: buildAttachmentContext(currentDraft.attachment),
          nodeRoleInstruction: isLeaf
            ? "这是最末级模块，请输出边界清晰、论述完整的独立内容，尽可能充分展开，目标字数控制在 1800 至 2500 字左右。"
            : "这是父级模块，请基于下级模块内容写出归纳总结型内容，明确本节定位、边界与对下级模块的统摄关系。",
          nodeBoundaryInstruction: isLeaf
            ? "内容要求：聚焦本模块职责、建设内容、技术路径、实施方式、交付成果与价值，不要越界到兄弟模块。"
            : "内容要求：只做概括、统筹、归纳和承接，不替代下级模块的细节展开。",
          childSummaryLabel: childSummaries.length ? "下级模块摘要：" : "本节无下级模块摘要：",
          childSummaries: childSummaries.length ? childSummaries.join("\n\n") : "无"
        });

        const response = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${API_KEY}`
          },
          body: JSON.stringify({
            model: MODEL,
            temperature: 0.35,
            max_tokens: DOCUMENT_MAX_TOKENS,
            messages: [
              {
                role: "system",
                content: promptConfig.documentNodeSystem
              },
              {
                role: "user",
                content: prompt
              }
            ]
          })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.message || payload.error?.message || `章节 ${node.id} 生成失败。`);
        }

        const content = payload.choices?.[0]?.message?.content?.trim();
        if (!content) {
          throw new Error(`章节 ${node.id} 未返回有效内容。`);
        }

        const sanitized = content.replace(/^```json/i, "").replace(/^```/, "").replace(/```$/, "").trim();
        let parsed;
        try {
          parsed = JSON.parse(sanitized);
        } catch (error) {
          throw new Error(`章节 ${node.id} 返回格式异常，无法解析 JSON。`);
        }

        const paragraphs = Array.isArray(parsed.paragraphs)
          ? parsed.paragraphs.map((item) => normalizeLine(String(item))).filter(Boolean)
          : [];

        if (!paragraphs.length) {
          throw new Error(`章节 ${node.id} 未返回有效段落。`);
        }

        return {
          id: node.id,
          title: parsed.title || `${node.id} ${node.title}`,
          level: node.level,
          paragraphs
        };
      }

      function saveProgressState() {
        if (!progressState) {
          return;
        }
        window.ReportTaskStore.saveDocProgress(progressState);
      }

      function saveDoc(doc) {
        window.ReportTaskStore.saveDoc(doc);
      }

      function buildSectionHtml(node) {
        const generated = generationMap[node.id];
        if (!generated || !Array.isArray(generated.paragraphs)) {
          throw new Error(`章节 ${node.id} 的缓存内容不完整，需要重新生成。`);
        }
        const tag = node.level === 1 ? "h2" : node.level === 2 ? "h3" : node.level === 3 ? "h4" : "h4";
        const paragraphs = generated.paragraphs
          .map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`)
          .join("");
        const childrenHtml = node.children.map((child) => buildSectionHtml(child)).join("");
        return `<section class="generated-doc-section"><${tag}>${escapeHtml(generated.title)}</${tag}>${paragraphs}${childrenHtml}</section>`;
      }

      function buildDocumentHtml(tree) {
        return tree.map((node) => buildSectionHtml(node)).join("");
      }

      function renderDoc(doc) {
        writeDocContent.innerHTML = doc.html;
        writeDocShell.hidden = false;
        writeDocActions.hidden = false;
        writeProgressShell.hidden = true;
        writeErrorState.hidden = true;
        writeDocTitle.textContent = doc.title;
        writeDocPaperTitle.textContent = doc.title;
        writeDocDesc.textContent = "正文内容已逐级生成完成，下方展示为正式文档排版，可直接下载。";
      }

      function renderError(message) {
        writeProgressShell.hidden = true;
        writeDocShell.hidden = true;
        writeDocActions.hidden = true;
        writeErrorState.hidden = false;
        writeErrorText.textContent = message;
      }

      function createWordParagraph(text, options = {}) {
        const size = options.size || 24;
        const bold = options.bold ? "<w:b/>" : "";
        const center = options.center ? "<w:jc w:val=\"center\"/>" : "";
        const firstLine = options.firstLine ? `<w:ind w:firstLine="${options.firstLine}"/>` : "";
        const spacing = `<w:spacing w:before="${options.before || 0}" w:after="${options.after || 0}" w:line="${options.line || 480}" w:lineRule="auto"/>`;
        const keepNext = options.keepNext ? "<w:keepNext/>" : "";
        return `
          <w:p>
            <w:pPr>${center}${firstLine}${spacing}${keepNext}</w:pPr>
            <w:r>
              <w:rPr>${bold}<w:sz w:val="${size}"/><w:szCs w:val="${size}"/></w:rPr>
              <w:t xml:space="preserve">${escapeXml(text)}</w:t>
            </w:r>
          </w:p>
        `;
      }

      function buildWordDocumentXml(doc) {
        const body = [];
        body.push(createWordParagraph(doc.title, { size: 36, bold: true, center: true, after: 360, line: 560 }));

        const appendNode = (node) => {
          const generated = generationMap[node.id];
          const sizeMap = { 1: 32, 2: 30, 3: 28, 4: 26, 5: 24 };
          body.push(
            createWordParagraph(generated.title, {
              size: sizeMap[node.level] || 24,
              bold: true,
              before: node.level === 1 ? 280 : 220,
              after: 140,
              line: 420,
              keepNext: true
            })
          );
          generated.paragraphs.forEach((paragraph) => {
            body.push(
              createWordParagraph(paragraph, {
                size: 24,
                firstLine: 420,
                after: 120,
                line: 520
              })
            );
          });
          node.children.forEach(appendNode);
        };

        currentTree.forEach(appendNode);

        return `
<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:o="urn:schemas-microsoft-com:office:office"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:wp14="http://schemas.microsoft.com/office/word/2010/wordprocessingDrawing"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  xmlns:w10="urn:schemas-microsoft-com:office:word"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml"
  xmlns:w15="http://schemas.microsoft.com/office/word/2012/wordml"
  xmlns:w16cex="http://schemas.microsoft.com/office/word/2018/wordml/cex"
  xmlns:w16cid="http://schemas.microsoft.com/office/word/2016/wordml/cid"
  xmlns:w16="http://schemas.microsoft.com/office/word/2018/wordml"
  xmlns:w16du="http://schemas.microsoft.com/office/word/2023/wordml/word16du"
  xmlns:w16sdtdh="http://schemas.microsoft.com/office/word/2020/wordml/sdtdatahash"
  xmlns:w16sdtfl="http://schemas.microsoft.com/office/word/2024/wordml/sdtformatlock"
  xmlns:w16se="http://schemas.microsoft.com/office/word/2015/wordml/symex"
  mc:Ignorable="w14 w15 w16se w16cid w16 w16cex w16sdtdh w16sdtfl w16du wp14">
  <w:body>
    ${body.join("")}
    <w:sectPr>
      <w:pgSz w:w="11906" w:h="16838"/>
      <w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440" w:header="708" w:footer="708" w:gutter="0"/>
    </w:sectPr>
  </w:body>
</w:document>
        `.trim();
      }

      function crc32(buffer) {
        const table = crc32.table || (crc32.table = (() => {
          const values = [];
          for (let i = 0; i < 256; i += 1) {
            let c = i;
            for (let k = 0; k < 8; k += 1) {
              c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
            }
            values[i] = c >>> 0;
          }
          return values;
        })());
        let crc = 0 ^ -1;
        for (let i = 0; i < buffer.length; i += 1) {
          crc = (crc >>> 8) ^ table[(crc ^ buffer[i]) & 0xff];
        }
        return (crc ^ -1) >>> 0;
      }

      function toDosDateTime(date) {
        const year = Math.max(date.getFullYear(), 1980);
        const dosTime = (date.getHours() << 11) | (date.getMinutes() << 5) | (Math.floor(date.getSeconds() / 2));
        const dosDate = ((year - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate();
        return { dosTime, dosDate };
      }

      function createZip(files) {
        const encoder = new TextEncoder();
        const fileEntries = [];
        const centralEntries = [];
        let offset = 0;
        const now = toDosDateTime(new Date());

        files.forEach((file) => {
          const nameBytes = encoder.encode(file.name);
          const dataBytes = encoder.encode(file.content);
          const crc = crc32(dataBytes);

          const localHeader = new Uint8Array(30 + nameBytes.length + dataBytes.length);
          const localView = new DataView(localHeader.buffer);
          localView.setUint32(0, 0x04034b50, true);
          localView.setUint16(4, 20, true);
          localView.setUint16(6, 0, true);
          localView.setUint16(8, 0, true);
          localView.setUint16(10, now.dosTime, true);
          localView.setUint16(12, now.dosDate, true);
          localView.setUint32(14, crc, true);
          localView.setUint32(18, dataBytes.length, true);
          localView.setUint32(22, dataBytes.length, true);
          localView.setUint16(26, nameBytes.length, true);
          localView.setUint16(28, 0, true);
          localHeader.set(nameBytes, 30);
          localHeader.set(dataBytes, 30 + nameBytes.length);

          const central = new Uint8Array(46 + nameBytes.length);
          const centralView = new DataView(central.buffer);
          centralView.setUint32(0, 0x02014b50, true);
          centralView.setUint16(4, 20, true);
          centralView.setUint16(6, 20, true);
          centralView.setUint16(8, 0, true);
          centralView.setUint16(10, 0, true);
          centralView.setUint16(12, now.dosTime, true);
          centralView.setUint16(14, now.dosDate, true);
          centralView.setUint32(16, crc, true);
          centralView.setUint32(20, dataBytes.length, true);
          centralView.setUint32(24, dataBytes.length, true);
          centralView.setUint16(28, nameBytes.length, true);
          centralView.setUint16(30, 0, true);
          centralView.setUint16(32, 0, true);
          centralView.setUint16(34, 0, true);
          centralView.setUint16(36, 0, true);
          centralView.setUint32(38, 0, true);
          centralView.setUint32(42, offset, true);
          central.set(nameBytes, 46);

          fileEntries.push(localHeader);
          centralEntries.push(central);
          offset += localHeader.length;
        });

        const centralSize = centralEntries.reduce((sum, item) => sum + item.length, 0);
        const end = new Uint8Array(22);
        const endView = new DataView(end.buffer);
        endView.setUint32(0, 0x06054b50, true);
        endView.setUint16(8, files.length, true);
        endView.setUint16(10, files.length, true);
        endView.setUint32(12, centralSize, true);
        endView.setUint32(16, offset, true);
        endView.setUint16(20, 0, true);

        return new Blob([...fileEntries, ...centralEntries, end], {
          type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        });
      }

      function buildDocxBlob(doc) {
        const documentXml = buildWordDocumentXml(doc);
        const coreXml = `
<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties"
  xmlns:dc="http://purl.org/dc/elements/1.1/"
  xmlns:dcterms="http://purl.org/dc/terms/"
  xmlns:dcmitype="http://purl.org/dc/dcmitype/"
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <dc:title>${escapeXml(doc.title)}</dc:title>
  <dc:creator>OpenAI Codex</dc:creator>
  <cp:lastModifiedBy>OpenAI Codex</cp:lastModifiedBy>
</cp:coreProperties>
        `.trim();

        const appXml = `
<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Properties xmlns="http://schemas.openxmlformats.org/officeDocument/2006/extended-properties"
  xmlns:vt="http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes">
  <Application>Microsoft Office Word</Application>
</Properties>
        `.trim();

        const contentTypesXml = `
<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>
  <Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>
</Types>
        `.trim();

        const rootRelsXml = `
<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/>
  <Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/>
</Relationships>
        `.trim();

        return createZip([
          { name: "[Content_Types].xml", content: contentTypesXml },
          { name: "_rels/.rels", content: rootRelsXml },
          { name: "docProps/core.xml", content: coreXml },
          { name: "docProps/app.xml", content: appXml },
          { name: "word/document.xml", content: documentXml }
        ]);
      }

      function downloadDocx() {
        if (!currentDoc) {
          return;
        }
        const blob = buildDocxBlob(currentDoc);
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${currentDoc.title}.docx`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      async function generateDocument(force = false) {
        if (!currentDraft || !outlineGroups.length) {
          renderError("缺少有效的大纲内容，请返回上一步重新生成大纲。");
          return;
        }

        const signature = buildSignature(currentDraft, outlineGroups);
        const currentRecord = window.ReportTaskStore.getCurrentRecord();
        if (!force) {
          const savedDoc = currentRecord?.doc;
          if (savedDoc) {
            if (savedDoc.signature === signature && isValidDocPayload(savedDoc)) {
              currentDoc = savedDoc;
              generationMap = savedDoc.generationMap || {};
              renderDoc(savedDoc);
              return;
            }
            window.ReportTaskStore.clearDocState("大纲已生成");
          }
        } else {
          window.ReportTaskStore.clearDocState("大纲已生成");
          generationMap = {};
        }

        writeProgressShell.hidden = false;
        writeDocShell.hidden = true;
        writeDocActions.hidden = true;
        writeErrorState.hidden = true;

        const signatureState = buildSignature(currentDraft, outlineGroups);
        const rawProgress = window.ReportTaskStore.getCurrentRecord()?.docProgress || null;
        progressState = {
          signature: signatureState,
          generatedMap: {},
          nextIndex: 0,
          retries: {},
          failedNodeId: null
        };

        if (rawProgress && !force) {
          if (isValidProgressPayload(rawProgress, signatureState)) {
            progressState = rawProgress;
          }
          if (!isValidProgressPayload(progressState, signatureState)) {
            window.ReportTaskStore.saveDocProgress({
              signature: signatureState,
              generatedMap: {},
              nextIndex: 0,
              retries: {},
              failedNodeId: null
            });
            progressState = {
              signature: signatureState,
              generatedMap: {},
              nextIndex: 0,
              retries: {},
              failedNodeId: null
            };
          }
        }

        generationMap = progressState.generatedMap || {};
        updateTimeline(generationTasks, generationTasks[Math.min(progressState.nextIndex, generationTasks.length - 1)]?.id);

        for (let index = progressState.nextIndex; index < generationTasks.length; index += 1) {
          const task = generationTasks[index];
          const childSummaries = task.children
            .map((child) => generationMap[child.id])
            .filter(Boolean)
            .map((child) => `${child.title}\n${child.paragraphs.join("\n")}`);

          const attempt = progressState.retries[task.id] || 0;
          updateTimeline(generationTasks, task.id);
          setProgress(
            (index / generationTasks.length) * 100,
            index,
            generationTasks.length,
            "正在逐级生成正式正文",
            `当前章节：${task.id} ${task.title}${attempt ? `（第 ${attempt + 1} 次尝试）` : ""}`,
            "生成中"
          );

          try {
            const result = await requestNodeContent(task, childSummaries);
            generationMap[task.id] = result;
            progressState.generatedMap = generationMap;
            progressState.nextIndex = index + 1;
            progressState.failedNodeId = null;
            saveProgressState();
          } catch (error) {
            progressState.failedNodeId = task.id;
            progressState.retries[task.id] = attempt + 1;
            saveProgressState();

            if (attempt < 2) {
              index -= 1;
              continue;
            }

            setProgress(
              (index / generationTasks.length) * 100,
              index,
              generationTasks.length,
              "正文生成中断",
              `章节 ${task.id} 失败，已保存进度，可继续生成。`,
              "失败"
            );
            renderError(error.message || `章节 ${task.id} 生成失败。`);
            return;
          }
        }

        updateTimeline(generationTasks, generationTasks.length);
        setProgress(100, generationTasks.length, generationTasks.length, "正文生成完成", "全部章节已按层级生成并完成归纳汇总。", "已完成");

        let html = "";
        try {
          html = buildDocumentHtml(currentTree);
        } catch (error) {
          window.ReportTaskStore.clearDocState("大纲已生成");
          renderError(error.message || "文档缓存异常，请重新生成。");
          return;
        }
        currentDoc = {
          signature: signatureState,
          title: currentDraft.name || "项目申报方案",
          taskCount: generationTasks.length,
          generationMap,
          html
        };
        saveDoc(currentDoc);
        renderDoc(currentDoc);
      }

      function restoreContext() {
        const record = window.ReportTaskStore.ensureCurrentRecord();
        const rawDraft = record?.draft;
        const rawOutline = record?.outline;

        if (!rawDraft || !rawOutline) {
          renderError("缺少需求或大纲内容，请返回上一步重新生成。");
          return false;
        }

        try {
          currentDraft = rawDraft;
          const outlinePayload = rawOutline;
          outlineGroups = outlinePayload.groups || [];
        } catch (error) {
          renderError("读取历史数据失败，请返回上一步重新生成。");
          return false;
        }

        currentTree = parseOutlineTree(outlineGroups);
        generationTasks = flattenPostOrder(currentTree, []);
        writeDocTitle.textContent = currentDraft.name || "项目申报方案";
        writeDocPaperTitle.textContent = currentDraft.name || "项目申报方案";
        return generationTasks.length > 0;
      }

      downloadDocButton.addEventListener("click", downloadDocx);
      regenerateDocButton.addEventListener("click", () => generateDocument(true));
      retryDocGenerationButton.addEventListener("click", () => generateDocument(false));

      if (restoreContext()) {
        updateTimeline(generationTasks, generationTasks[0]?.id || null);
        setProgress(0, 0, generationTasks.length, "正在准备正文生成", "系统正在读取大纲树并建立最末级优先的生成队列。", "准备中");
        generateDocument();
      }
    </script>
  </body>
</html>
